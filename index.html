<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Blog Post - Projeto de Certificação 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Simulador Blog Post</h1>
    </header>

    <main>
        <section class="post-form-section">
            <h2>Crie sua Postagem</h2>
            <form id="post-form">
                <div class="form-group">
                    <label for="titulo">Título do Post:</label>
                    <input type="text" id="titulo" placeholder="Digite o título aqui..." required>
                </div>
                <div class="form-group">
                    <label for="conteudo">Conteúdo:</label>
                    <textarea id="conteudo" rows="5" placeholder="O que você está pensando?" required></textarea>
                </div>
                <button type="submit" id="btn-postar">Postar Agora</button>
            </form>
        </section>

        <hr>

        <section class="render-section">
            <h2>Visualização do Post Enviado</h2>
            <article id="post-renderizado" class="post-card hidden">
                <h3 id="renderizador-titulo"></h3>
                <p id="renderizador-conteudo"></p>
                <small>Postado com sucesso via API!</small>
            </article>
            <div id="loading" class="hidden">Enviando postagem...</div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Projeto de Certificação 2 - DEVstart 2026</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
